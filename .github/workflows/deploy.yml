name: Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check safe deploy window
        run: |
          HOUR=$(TZ="America/New_York" date +%H)
          MIN=$(TZ="America/New_York" date +%M)
          if [ "$HOUR" -eq 3 ] && [ "$MIN" -ge 30 ]; then
            echo "Deploy blocked — too close to 4 AM digest run"
            exit 1
          fi
          if [ "$HOUR" -eq 4 ] && [ "$MIN" -le 30 ]; then
            echo "Deploy blocked — digest may be running"
            exit 1
          fi
          echo "Deploy window is safe — proceeding"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build zip package
        run: |
          zip -r function.zip . \
            --exclude "*.env" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "test/*" \
            --exclude "logs/*" \
            --exclude "run-digest.bat" \
            --exclude "*.log"

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://function.zip \
            --region ${{ secrets.AWS_REGION }}

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --region ${{ secrets.AWS_REGION }}
          echo "✓ Lambda updated successfully"